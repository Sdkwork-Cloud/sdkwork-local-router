[server]
bind = "127.0.0.1"
port = 8080
max_body_size_mb = 50

[storage]
database_url = "sqlite:./data/local-router.db?mode=rwc"
# Encrypts upstream API keys stored in local_router_upstream_accounts.
# Client API keys are stored as hashes in local_router_client_api_keys.
# encryption_secret = "change-me-to-a-strong-secret"  # Or set SDKWORK_LR_ENCRYPTION_SECRET env var

# Local authentication is not configured in TOML. Proxy/OpenAI/Claude/Gemini-compatible
# requests authenticate with a database-backed client API key created through
# /backend/v3/api/router/client_api_keys.
# The client API key row carries user_id; an empty user context defaults to 0.
# App/backend APIs resolve user_id from SDKWork auth/access tokens or JWT context.

[logging]
level = "info"
format = "text"

[base_paths]
# local-router-open-api provider-compatible proxy prefixes.
# Codex/OpenAI-compatible clients use openai, Claude Code-compatible clients use
# anthropic, and Gemini-compatible clients use google. These paths are grouped
# as local-router-open-api at runtime and authenticated by client_api_key.
openai = "/v1"
anthropic = "/anthropic"
google = "/google"

[fallback]
enabled = true
max_attempts = 3

[rate_limit]
enabled = false
max_requests = 60
window_secs = 60

[cors]
allowed_origins = ["http://localhost:*"]

[routing]
# Optional. Use "auto" or omit the key for priority on single-account pools
# and round_robin on multi-account pools. Explicit values override this per
# resolved user account pool.
strategy = "round_robin"

[plugins]
# enabled=false keeps the original client API surface and only applies model aliases.
enabled = true
# auto: use sdkwork-models vendor/model metadata to choose the target API surface.
# strict: same as auto, but request transform failures return 400 instead of forwarding the original body.
# passthrough: disable body/path API conversion while preserving model aliases.
# force_transform: ignore model catalog target surface and convert to the selected upstream provider surface.
policy = "auto"
# Expose x-sdkwork-plugin-* decision headers on proxied responses for IDE/tool diagnostics.
expose_decision_headers = true

[recording]
save_request_body = false
save_response_body = false
retention_days = 30

[circuit_breaker]
failure_threshold = 5
success_threshold = 3
open_duration_secs = 60
half_open_max_requests = 2

[health_probe]
enabled = true
interval_secs = 30
probe_timeout_secs = 10

[[upstreams]]
name = "openai-direct"
provider = "openai"
base_url = "https://api.openai.com/v1"
# Upstream provider credential only. It must never be used as a local-router
# client identity credential.
upstream_api_key = ""
models = ["gpt-4o*", "gpt-4*", "o3*", "o4*"]
priority = 10
timeout_secs = 120
max_retries = 2
retry_delay_ms = 500

[upstreams.model_aliases]
"gpt-4o" = "gpt-4o-2024-08-06"

[[upstreams]]
name = "claude-direct"
provider = "anthropic"
base_url = "https://api.anthropic.com"
upstream_api_key = ""
models = ["claude-*"]
priority = 10
timeout_secs = 120
anthropic_version = "2023-06-01"

[upstreams.model_aliases]
"claude-3.5-sonnet" = "claude-3-5-sonnet-20241022"

[[upstreams]]
name = "gemini-direct"
provider = "google"
base_url = "https://generativelanguage.googleapis.com"
upstream_api_key = ""
models = ["gemini-*"]
priority = 10
timeout_secs = 120

[[upstreams]]
name = "openai-compatible-proxy"
provider = "openai"
base_url = "https://your-proxy.example.com/v1"
upstream_api_key = ""
models = ["*"]
priority = 100
timeout_secs = 180
