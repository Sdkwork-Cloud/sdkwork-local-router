version: "3.8"

services:
  sdkwork-local-router-sqlite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdkwork-local-router
    ports:
      - "${SDKWORK_LR_PORT:-8080}:8080"
    environment:
      SDKWORK_LR_CONFIG_FILE: /app/config.toml
      SDKWORK_LR_ENCRYPTION_SECRET: ${SDKWORK_LR_ENCRYPTION_SECRET:-}
      SDKWORK_LR_BIND: "0.0.0.0"
      SDKWORK_LR_PORT: "8080"
      SDKWORK_LR_AUTH_MODE: ${SDKWORK_LR_AUTH_MODE:-none}
      SDKWORK_LR_DATABASE_URL: sqlite:./data/local-router.db?mode=rwc
    volumes:
      - sqlite-data:/app/data
      - ./config.example.toml:/app/config.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sdkwork-local-router-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdkwork-local-router-pg
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SDKWORK_LR_PORT:-8080}:8080"
    environment:
      SDKWORK_LR_ENCRYPTION_SECRET: ${SDKWORK_LR_ENCRYPTION_SECRET:-}
      SDKWORK_LR_BIND: "0.0.0.0"
      SDKWORK_LR_PORT: "8080"
      SDKWORK_LR_AUTH_MODE: ${SDKWORK_LR_AUTH_MODE:-none}
      SDKWORK_LR_DATABASE_URL: postgres://${POSTGRES_USER:-sdkwork}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-sdkwork_lr}
    volumes:
      - ./config.example.toml:/app/config.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: sdkwork-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdkwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-sdkwork_lr}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdkwork -d sdkwork_lr"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

volumes:
  sqlite-data:
  pg-data:
