[package]
name = "sdkwork-local-api-proxy-native"
version = "0.1.0"
edition = "2021"
description = "Native runtime scaffold for the SDKWORK local API proxy package."
license = "UNLICENSED"
publish = false

[lib]
name = "sdkwork_local_api_proxy_native"
path = "src/lib.rs"

[dependencies]
axum = "0.8"
json5 = "1.0"
reqwest = { version = "0.13", default-features = false, features = ["http2", "json", "rustls", "stream"] }
# rusqlite 0.31.0 uses libsqlite3-sys 0.28.0, matching sqlx 0.8.0 in the workspace.
# This resolves the libsqlite3-sys links conflict.
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["net", "rt", "time"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3"
